bundle:
  name: rtm_fraud_detection

variables:
  project_name:
    description: "Name of the solution accelerator"
    default: "rtm-fraud-detection"

  warehouse_id:
    lookup:
      warehouse: "Shared Unity Catalog Serverless"

  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

targets:
  dev:
    default: true
    mode: development

resources:
  jobs:
    rtm_fraud_detection_workflow:
      name: "${var.project_name} - Fraud Detection Workflow"

      job_clusters:
        - job_cluster_key: rtm_cluster
          new_cluster:
            spark_version: "18.0.x-scala2.13"
            num_workers: 6
            node_type_id: "i3.xlarge"
            driver_node_type_id: "i3.xlarge"
            runtime_engine: STANDARD
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.streaming.realTimeMode.enabled: "true"
              spark.sql.shuffle.partitions: "4"
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto

      tasks:
        # Step 0: Introduction / Overview
        - task_key: introduction
          job_cluster_key: rtm_cluster
          notebook_task:
            notebook_path: "./notebooks/00_Introduction"

        # Step 1: Quick Start (self-contained RTM demo, no Kafka)
        - task_key: quick_start
          depends_on:
            - task_key: introduction
          job_cluster_key: rtm_cluster
          notebook_task:
            notebook_path: "./notebooks/RTM_00_Quick_Start"

        # Step 2: Full fraud detection with Kafka + stateful processing
        - task_key: fraud_detection_streaming
          depends_on:
            - task_key: quick_start
          job_cluster_key: rtm_cluster
          notebook_task:
            notebook_path: "./notebooks/RTM_01_Introduction_fraud_detection"

        # Step 3: ML-powered fraud detection with Lakebase + MLflow
        - task_key: advanced_ml_fraud
          depends_on:
            - task_key: fraud_detection_streaming
          job_cluster_key: rtm_cluster
          notebook_task:
            notebook_path: "./notebooks/RTM_02_Advanced_fraud_detection_ml"

